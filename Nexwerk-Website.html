document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

>\n\n<!-- ===== NAV ===== -->\n<header style=\"position:sticky; top:0; z-index:50; background:rgba(255,255,255,0.82); backdrop-filter:blur(12px); border-bottom:1px solid #eef2f0;\">\n  <div style=\"max-width:1160px; margin:0 auto; padding:16px 32px; display:flex; align-items:center; justify-content:space-between; gap:24px;\">\n    <a href=\"#top\" style=\"display:flex; align-items:center; gap:12px;\">\n      <svg width=\"30\" height=\"30\" viewBox=\"0 0 56 56\" fill=\"none\" stroke=\"#0e4a36\" stroke-width=\"2.8\" stroke-linecap=\"round\"><line x1=\"18\" y1=\"38\" x2=\"18\" y2=\"18\"><\u002Fline><line x1=\"18\" y1=\"18\" x2=\"38\" y2=\"38\"><\u002Fline><line x1=\"38\" y1=\"38\" x2=\"38\" y2=\"18\"><\u002Fline><circle cx=\"18\" cy=\"38\" r=\"4.6\" fill=\"#0e4a36\" stroke=\"none\"><\u002Fcircle><circle cx=\"18\" cy=\"18\" r=\"4.6\" fill=\"#0e4a36\" stroke=\"none\"><\u002Fcircle><circle cx=\"38\" cy=\"38\" r=\"4.6\" fill=\"#0e4a36\" stroke=\"none\"><\u002Fcircle><circle cx=\"38\" cy=\"18\" r=\"5.2\" fill=\"#25a17c\" stroke=\"none\"><\u002Fcircle><\u002Fsvg>\n      <span style=\"font-family:'Archivo'; font-size:22px; font-weight:700; letter-spacing:-0.025em; color:#16241e;\">Nexwerk<\u002Fspan>\n    <\u002Fa>\n    <nav style=\"display:flex; align-items:center; gap:30px; flex-wrap:wrap;\">\n      <a href=\"#prinzip\" style=\"font-size:15px; font-weight:500; color:#41514a;\">Prinzip<\u002Fa>\n      <a href=\"#betrieb\" style=\"font-size:15px; font-weight:500; color:#41514a;\">Im Betrieb<\u002Fa>\n      <a href=\"#ablauf\" style=\"font-size:15px; font-weight:500; color:#41514a;\">Ablauf<\u002Fa>\n      <a href=\"#kontakt\" style=\"font-family:'Hanken Grotesk'; font-size:15px; font-weight:600; color:#fff; background:#0e4a36; padding:10px 18px; border-radius:9px;\">Vorabgespräch<\u002Fa>\n    <\u002Fnav>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<!-- ===== HERO ===== -->\n<section id=\"top\" style=\"background:#f4f6f5;\">\n  <div style=\"max-width:1160px; margin:0 auto; padding:100px 32px 96px; display:flex; gap:44px; align-items:center; flex-wrap:wrap;\">\n    <div style=\"flex:1 1 420px;\">\n      <div style=\"font-size:13px; font-weight:600; letter-spacing:0.16em; text-transform:uppercase; color:#25a17c; margin-bottom:22px;\">Agentische Entscheidungsunterstützung<\u002Fdiv>\n      <h1 style=\"font-family:'Archivo'; font-size:clamp(34px,4.6vw,56px); font-weight:800; letter-spacing:-0.03em; line-height:1.05; margin:0; max-width:560px; color:#16241e;\">Effizientere Entscheidungen für nachhaltige Lösungen<\u002Fh1>\n      <p style=\"font-size:clamp(17px,2vw,20px); line-height:1.6; color:#41514a; max-width:540px; margin:28px 0 0;\">Nexwerk verbindet Ihr Unternehmen mit einem Netzwerk autonomer Agenten, von Fördermitteln bis Ökobilanz. Sie liefern Kontext, die Agenten liefern fundierte, nachvollziehbare Entscheidungsgrundlagen.<\u002Fp>\n      <div style=\"display:flex; gap:10px; flex-wrap:wrap; margin-top:36px; align-items:center;\">\n        <a href=\"#kontakt\" style=\"display:inline-flex; align-items:center; gap:10px; font-weight:700; font-size:17px; color:#fff; background:#25a17c; padding:17px 32px; border-radius:11px; box-shadow:0 10px 24px rgba(37,161,124,0.34);\">Vorabgespräch vereinbaren <span style=\"display:inline-block; animation:nudge 1.6s ease-in-out infinite;\">→<\u002Fspan><\u002Fa>\n        <a href=\"#betrieb\" style=\"font-weight:600; font-size:16px; color:#0e4a36; padding:17px 16px; border-radius:11px;\">So funktioniert’s<\u002Fa>\n      <\u002Fdiv>\n      <div style=\"display:flex; align-items:center; gap:18px; flex-wrap:wrap; margin-top:20px; font-size:13.5px; font-weight:500; color:#5c6e66;\">\n        <span style=\"display:inline-flex; align-items:center; gap:7px;\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#25a17c\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>Kostenlos &amp; unverbindlich<\u002Fspan>\n        <span style=\"display:inline-flex; align-items:center; gap:7px;\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#25a17c\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>~15 Minuten<\u002Fspan>\n        <span style=\"display:inline-flex; align-items:center; gap:7px;\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#25a17c\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>Antwort in 24 h<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex:0 1 360px; display:flex; justify-content:center; align-items:center; min-width:260px;\">\n      <div style=\"animation:floaty 5.5s ease-in-out infinite;\">\n        <svg viewBox=\"0 0 140 140\" width=\"360\" height=\"360\" style=\"max-width:100%; height:auto; display:block;\" fill=\"none\">\n          <circle cx=\"70\" cy=\"70\" r=\"56\" fill=\"#25a17c\" opacity=\"0.10\"><\u002Fcircle>\n          <circle cx=\"70\" cy=\"70\" r=\"60\" stroke=\"#5ea585\" stroke-width=\"1.6\" stroke-dasharray=\"2 9\" stroke-linecap=\"round\">\n            <animateTransform attributeName=\"transform\" type=\"rotate\" from=\"0 70 70\" to=\"360 70 70\" dur=\"22s\" repeatCount=\"indefinite\"><\u002FanimateTransform>\n          <\u002Fcircle>\n          <circle cx=\"70\" cy=\"70\" r=\"44\" stroke=\"#94c4b2\" stroke-width=\"1.3\"><\u002Fcircle>\n          <g stroke=\"#0e4a36\" stroke-width=\"3.6\" stroke-linecap=\"round\">\n            <line x1=\"50\" y1=\"90\" x2=\"50\" y2=\"50\"><\u002Fline>\n            <line x1=\"50\" y1=\"50\" x2=\"90\" y2=\"90\"><\u002Fline>\n            <line x1=\"90\" y1=\"90\" x2=\"90\" y2=\"50\"><\u002Fline>\n          <\u002Fg>\n          <circle cx=\"50\" cy=\"90\" r=\"5.8\" fill=\"#0e4a36\"><\u002Fcircle>\n          <circle cx=\"50\" cy=\"50\" r=\"5.8\" fill=\"#0e4a36\"><\u002Fcircle>\n          <circle cx=\"90\" cy=\"90\" r=\"5.8\" fill=\"#0e4a36\"><\u002Fcircle>\n          <circle cx=\"90\" cy=\"50\" r=\"6.6\" fill=\"#25a17c\"><\u002Fcircle>\n          <circle cx=\"90\" cy=\"50\" r=\"6.6\" fill=\"none\" stroke=\"#25a17c\" stroke-width=\"2\">\n            <animate attributeName=\"r\" values=\"6.6;17\" dur=\"2.1s\" repeatCount=\"indefinite\"><\u002Fanimate>\n            <animate attributeName=\"opacity\" values=\"0.7;0\" dur=\"2.1s\" repeatCount=\"indefinite\"><\u002Fanimate>\n          <\u002Fcircle>\n          <circle r=\"3.4\" fill=\"#25a17c\" style=\"filter:drop-shadow(0 0 5px rgba(37,161,124,.9));\">\n            <animateMotion dur=\"2.8s\" repeatCount=\"indefinite\" path=\"M50 90 L50 50 L90 90 L90 50\"><\u002FanimateMotion>\n          <\u002Fcircle>\n          <circle r=\"2.6\" fill=\"#34b88c\" style=\"filter:drop-shadow(0 0 4px rgba(52,184,140,.85));\">\n            <animateMotion dur=\"2.8s\" begin=\"-1.4s\" repeatCount=\"indefinite\" path=\"M50 90 L50 50 L90 90 L90 50\"><\u002FanimateMotion>\n          <\u002Fcircle>\n        <\u002Fsvg>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===== PRINZIP ===== -->\n<section id=\"prinzip\" style=\"background:#fff;\">\n  <div style=\"max-width:1160px; margin:0 auto; padding:104px 32px;\">\n    <div style=\"font-size:13px; font-weight:600; letter-spacing:0.16em; text-transform:uppercase; color:#25a17c; margin-bottom:16px;\">Das Prinzip<\u002Fdiv>\n    <h2 style=\"font-family:'Archivo'; font-size:clamp(28px,3.6vw,42px); font-weight:800; letter-spacing:-0.025em; line-height:1.1; margin:0; max-width:760px; color:#16241e;\">Was bedeutet „agentisch“?<\u002Fh2>\n    <p style=\"font-size:18px; line-height:1.65; color:#41514a; max-width:720px; margin:24px 0 0;\">Statt eines einzelnen Modells arbeitet bei Nexwerk ein Team spezialisierter Agenten. Jeder Agent beherrscht ein Feld wie Fördermittel, Ökobilanz, Compliance oder Reporting, recherchiert eigenständig, prüft Quellen und stimmt sich mit den anderen ab. Das Ergebnis: belastbare Entscheidungen, die Sie nachvollziehen und verantworten können.<\u002Fp>\n    <div style=\"display:flex; flex-wrap:wrap; gap:20px; margin-top:52px;\">\n      <div style=\"flex:1 1 280px; border:1px solid #eef2f0; border-radius:14px; padding:32px;\">\n        <div style=\"width:42px; height:42px; border-radius:10px; background:#eef6f2; display:flex; align-items:center; justify-content:center; margin-bottom:18px;\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#0e4a36\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"3\"><\u002Fcircle><path d=\"M12 2v3M12 19v3M2 12h3M19 12h3\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h3 style=\"font-family:'Archivo'; font-size:20px; font-weight:700; margin:0 0 8px; color:#16241e;\">Autonom<\u002Fh3>\n        <p style=\"font-size:15.5px; line-height:1.6; color:#5c6e66; margin:0;\">Agenten recherchieren, rechnen und prüfen selbstständig. Sie geben das Ziel vor.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"flex:1 1 280px; border:1px solid #eef2f0; border-radius:14px; padding:32px;\">\n        <div style=\"width:42px; height:42px; border-radius:10px; background:#eef6f2; display:flex; align-items:center; justify-content:center; margin-bottom:18px;\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#0e4a36\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 2 4 6v6c0 5 3.5 7.5 8 10 4.5-2.5 8-5 8-10V6z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h3 style=\"font-family:'Archivo'; font-size:20px; font-weight:700; margin:0 0 8px; color:#16241e;\">Spezialisiert<\u002Fh3>\n        <p style=\"font-size:15.5px; line-height:1.6; color:#5c6e66; margin:0;\">Jeder Agent ist Experte für genau eine Domäne, statt Mittelmaß über alles.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"flex:1 1 280px; border:1px solid #eef2f0; border-radius:14px; padding:32px;\">\n        <div style=\"width:42px; height:42px; border-radius:10px; background:#eef6f2; display:flex; align-items:center; justify-content:center; margin-bottom:18px;\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#0e4a36\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M9 12l2 2 4-4\"><\u002Fpath><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><\u002Fsvg><\u002Fdiv>\n        <h3 style=\"font-family:'Archivo'; font-size:20px; font-weight:700; margin:0 0 8px; color:#16241e;\">Nachvollziehbar<\u002Fh3>\n        <p style=\"font-size:15.5px; line-height:1.6; color:#5c6e66; margin:0;\">Jeder Schluss ist mit Quelle und Begründung hinterlegt, prüfbar und verantwortbar.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===== BETRIEB / ANIMATION ===== -->\n<section id=\"betrieb\" style=\"background:#0e2d22;\">\n  <div ref=\"{{ stageRef }}\" style=\"max-width:1160px; margin:0 auto; padding:104px 32px;\">\n    <div style=\"font-size:13px; font-weight:600; letter-spacing:0.16em; text-transform:uppercase; color:#5fbf9b; margin-bottom:16px;\">Im Betrieb<\u002Fdiv>\n    <h2 style=\"font-family:'Archivo'; font-size:clamp(28px,3.6vw,42px); font-weight:800; letter-spacing:-0.025em; line-height:1.1; margin:0; max-width:780px; color:#fff;\">Ein lebendiger Austausch zwischen Ihnen und den Agenten<\u002Fh2>\n    <p style=\"font-size:18px; line-height:1.65; color:#aecabd; max-width:680px; margin:22px 0 0;\">Ihr Unternehmen teilt Informationen, die Agenten verarbeiten sie und liefern geprüfte Ergebnisse zurück, kontinuierlich und parallel.<\u002Fp>\n\n    <div style=\"margin-top:56px;\">\n      <svg viewBox=\"0 0 1000 520\" style=\"width:100%; height:auto; display:block;\" font-family=\"Hanken Grotesk, sans-serif\">\n        <!-- orchestration lines: Nexwerk -> agents -->\n        <g stroke=\"#2c5746\" stroke-width=\"1.6\" fill=\"none\">\n          <line x1=\"186\" y1=\"260\" x2=\"372\" y2=\"127\"><\u002Fline>\n          <line x1=\"186\" y1=\"260\" x2=\"372\" y2=\"221\"><\u002Fline>\n          <line x1=\"186\" y1=\"260\" x2=\"372\" y2=\"315\"><\u002Fline>\n          <line x1=\"186\" y1=\"260\" x2=\"372\" y2=\"409\"><\u002Fline>\n        <\u002Fg>\n        <!-- exchange lines: agents <-> company (animated dashes) -->\n        <g stroke=\"#3f7a63\" stroke-width=\"1.8\" fill=\"none\" stroke-dasharray=\"2 6\" stroke-linecap=\"round\" style=\"animation:dash 1.1s linear infinite;\">\n          <line x1=\"628\" y1=\"127\" x2=\"800\" y2=\"256\"><\u002Fline>\n          <line x1=\"628\" y1=\"221\" x2=\"800\" y2=\"256\"><\u002Fline>\n          <line x1=\"628\" y1=\"315\" x2=\"800\" y2=\"256\"><\u002Fline>\n          <line x1=\"628\" y1=\"409\" x2=\"800\" y2=\"256\"><\u002Fline>\n        <\u002Fg>\n        <!-- delivery route: Nexwerk -> down -> right -> up -> company -->\n        <path d=\"M 111 314 L 111 500 L 888 500 L 888 318\" fill=\"none\" stroke=\"#3f7a63\" stroke-width=\"1.6\" stroke-dasharray=\"2 7\" stroke-linecap=\"round\" style=\"animation:dashRev 1.1s linear infinite;\"><\u002Fpath>\n\n        <!-- DSGVO local-hosting zone around agents -->\n        <rect x=\"346\" y=\"62\" width=\"308\" height=\"400\" rx=\"18\" fill=\"none\" stroke=\"#4f9a7c\" stroke-width=\"1.6\" stroke-dasharray=\"6 6\"><\u002Frect>\n        <rect x=\"360\" y=\"40\" width=\"280\" height=\"44\" rx=\"13\" fill=\"#14392c\" stroke=\"#4f9a7c\" stroke-width=\"1.4\"><\u002Frect>\n        <text x=\"500\" y=\"58\" text-anchor=\"middle\" font-size=\"12.5\" font-weight=\"600\" fill=\"#9fe0c6\" letter-spacing=\"0.2\">Lokal gehostet in Deutschland<\u002Ftext>\n        <text x=\"500\" y=\"74\" text-anchor=\"middle\" font-size=\"12.5\" font-weight=\"600\" fill=\"#9fe0c6\" letter-spacing=\"0.2\">DSGVO konform<\u002Ftext>\n\n        <!-- NEXWERK (wir) -->\n        <g>\n          <rect x=\"36\" y=\"208\" width=\"150\" height=\"104\" rx=\"16\" fill=\"#14392c\" stroke=\"#2c5746\" stroke-width=\"1.5\"><\u002Frect>\n          <g transform=\"translate(93,224) scale(0.62)\" fill=\"none\" stroke=\"#ffffff\" stroke-width=\"2.6\" stroke-linecap=\"round\"><line x1=\"18\" y1=\"38\" x2=\"18\" y2=\"18\"><\u002Fline><line x1=\"18\" y1=\"18\" x2=\"38\" y2=\"38\"><\u002Fline><line x1=\"38\" y1=\"38\" x2=\"38\" y2=\"18\"><\u002Fline><circle cx=\"18\" cy=\"38\" r=\"4.6\" fill=\"#ffffff\" stroke=\"none\"><\u002Fcircle><circle cx=\"18\" cy=\"18\" r=\"4.6\" fill=\"#ffffff\" stroke=\"none\"><\u002Fcircle><circle cx=\"38\" cy=\"38\" r=\"4.6\" fill=\"#ffffff\" stroke=\"none\"><\u002Fcircle><circle cx=\"38\" cy=\"18\" r=\"5.4\" fill=\"#34b88c\" stroke=\"none\"><\u002Fcircle><\u002Fg>\n          <text x=\"111\" y=\"288\" text-anchor=\"middle\" font-family=\"Archivo, sans-serif\" font-size=\"18\" font-weight=\"700\" fill=\"#ffffff\" letter-spacing=\"-0.5\">Nexwerk<\u002Ftext>\n          <text x=\"111\" y=\"303\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"600\" fill=\"#5fbf9b\" letter-spacing=\"1.4\">WIR<\u002Ftext>\n        <\u002Fg>\n\n        <!-- COMPANY (unternehmen) -->\n        <g>\n          <rect x=\"812\" y=\"204\" width=\"152\" height=\"112\" rx=\"16\" fill=\"#14392c\" stroke=\"#2c5746\" stroke-width=\"1.5\"><\u002Frect>\n          <g transform=\"translate(872,222)\" fill=\"none\" stroke=\"#ffffff\" stroke-width=\"2\"><rect x=\"0\" y=\"0\" width=\"32\" height=\"34\" rx=\"2\"><\u002Frect><line x1=\"7\" y1=\"8\" x2=\"11\" y2=\"8\"><\u002Fline><line x1=\"21\" y1=\"8\" x2=\"25\" y2=\"8\"><\u002Fline><line x1=\"7\" y1=\"16\" x2=\"11\" y2=\"16\"><\u002Fline><line x1=\"21\" y1=\"16\" x2=\"25\" y2=\"16\"><\u002Fline><line x1=\"7\" y1=\"24\" x2=\"11\" y2=\"24\"><\u002Fline><line x1=\"21\" y1=\"24\" x2=\"25\" y2=\"24\"><\u002Fline><\u002Fg>\n          <text x=\"888\" y=\"284\" text-anchor=\"middle\" font-family=\"Archivo, sans-serif\" font-size=\"16\" font-weight=\"700\" fill=\"#ffffff\" letter-spacing=\"-0.3\">Ihr<\u002Ftext>\n          <text x=\"888\" y=\"303\" text-anchor=\"middle\" font-family=\"Archivo, sans-serif\" font-size=\"16\" font-weight=\"700\" fill=\"#ffffff\" letter-spacing=\"-0.3\">Unternehmen<\u002Ftext>\n        <\u002Fg>\n\n        <!-- AGENTS -->\n        <g>\n          <rect x=\"372\" y=\"96\" width=\"256\" height=\"62\" rx=\"13\" fill=\"#ffffff\"><\u002Frect>\n          <circle cx=\"400\" cy=\"127\" r=\"6\" fill=\"#25a17c\"><\u002Fcircle>\n          <text x=\"418\" y=\"132\" font-family=\"Archivo, sans-serif\" font-size=\"17\" font-weight=\"600\" fill=\"#16241e\">Fördermittel.Agent<\u002Ftext>\n        <\u002Fg>\n        <g>\n          <rect x=\"372\" y=\"190\" width=\"256\" height=\"62\" rx=\"13\" fill=\"#ffffff\"><\u002Frect>\n          <circle cx=\"400\" cy=\"221\" r=\"6\" fill=\"#25a17c\"><\u002Fcircle>\n          <text x=\"418\" y=\"226\" font-family=\"Archivo, sans-serif\" font-size=\"17\" font-weight=\"600\" fill=\"#16241e\">Ökobilanz.Agent<\u002Ftext>\n        <\u002Fg>\n        <g>\n          <rect x=\"372\" y=\"284\" width=\"256\" height=\"62\" rx=\"13\" fill=\"#ffffff\"><\u002Frect>\n          <circle cx=\"400\" cy=\"315\" r=\"6\" fill=\"#25a17c\"><\u002Fcircle>\n          <text x=\"418\" y=\"320\" font-family=\"Archivo, sans-serif\" font-size=\"17\" font-weight=\"600\" fill=\"#16241e\">Compliance.Agent<\u002Ftext>\n        <\u002Fg>\n        <g>\n          <rect x=\"372\" y=\"378\" width=\"256\" height=\"62\" rx=\"13\" fill=\"#ffffff\"><\u002Frect>\n          <circle cx=\"400\" cy=\"409\" r=\"6\" fill=\"#25a17c\"><\u002Fcircle>\n          <text x=\"418\" y=\"414\" font-family=\"Archivo, sans-serif\" font-size=\"17\" font-weight=\"600\" fill=\"#16241e\">Reporting.Agent<\u002Ftext>\n        <\u002Fg>\n\n        <!-- inter-agent peer links (between stacked cards) -->\n        <g>\n          <line x1=\"500\" y1=\"156\" x2=\"500\" y2=\"192\" stroke=\"#74d6b1\" stroke-width=\"1.6\" stroke-dasharray=\"2 6\" stroke-linecap=\"round\" style=\"animation:dash 1.1s linear infinite;\"><\u002Fline>\n          <line x1=\"500\" y1=\"250\" x2=\"500\" y2=\"286\" stroke=\"#74d6b1\" stroke-width=\"1.6\" stroke-dasharray=\"2 6\" stroke-linecap=\"round\" style=\"animation:dash 1.1s linear infinite;\"><\u002Fline>\n          <line x1=\"500\" y1=\"344\" x2=\"500\" y2=\"380\" stroke=\"#74d6b1\" stroke-width=\"1.6\" stroke-dasharray=\"2 6\" stroke-linecap=\"round\" style=\"animation:dash 1.1s linear infinite;\"><\u002Fline>\n          <circle cx=\"500\" cy=\"156\" r=\"3\" fill=\"#74d6b1\"><\u002Fcircle>\n          <circle cx=\"500\" cy=\"192\" r=\"3\" fill=\"#74d6b1\"><\u002Fcircle>\n          <circle cx=\"500\" cy=\"250\" r=\"3\" fill=\"#74d6b1\"><\u002Fcircle>\n          <circle cx=\"500\" cy=\"286\" r=\"3\" fill=\"#74d6b1\"><\u002Fcircle>\n          <circle cx=\"500\" cy=\"344\" r=\"3\" fill=\"#74d6b1\"><\u002Fcircle>\n          <circle cx=\"500\" cy=\"380\" r=\"3\" fill=\"#74d6b1\"><\u002Fcircle>\n          <circle r=\"2.6\" fill=\"#25a17c\" style=\"filter:drop-shadow(0 0 4px rgba(37,161,124,.9));\"><animateMotion dur=\"1.4s\" repeatCount=\"indefinite\" path=\"M500 158 L500 190\"><\u002FanimateMotion><\u002Fcircle>\n          <circle r=\"2.6\" fill=\"#34b88c\" style=\"filter:drop-shadow(0 0 4px rgba(52,184,140,.9));\"><animateMotion dur=\"1.6s\" begin=\"-0.8s\" repeatCount=\"indefinite\" path=\"M500 284 L500 252\"><\u002FanimateMotion><\u002Fcircle>\n          <circle r=\"2.6\" fill=\"#25a17c\" style=\"filter:drop-shadow(0 0 4px rgba(37,161,124,.9));\"><animateMotion dur=\"1.5s\" begin=\"-0.5s\" repeatCount=\"indefinite\" path=\"M500 346 L500 378\"><\u002FanimateMotion><\u002Fcircle>\n        <\u002Fg>\n\n        <!-- dynamic packets, checks & crosses (JS-driven) -->\n        {{ dynamicLayer }}\n      <\u002Fsvg>\n      <div style=\"display:flex; align-items:center; gap:10px; justify-content:center; margin-top:26px;\">\n        <span style=\"width:8px; height:8px; border-radius:50%; background:#34b88c; display:inline-block;\"><\u002Fspan>\n        <span style=\"font-size:14.5px; color:#aecabd;\">Alle Agenten werden lokal in Deutschland gehostet, DSGVO konform und unter Ihrer Datenhoheit.<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===== ABLAUF ===== -->\n<section id=\"ablauf\" style=\"background:#fff;\">\n  <div style=\"max-width:1160px; margin:0 auto; padding:104px 32px;\">\n    <div style=\"font-size:13px; font-weight:600; letter-spacing:0.16em; text-transform:uppercase; color:#25a17c; margin-bottom:16px;\">Zusammenarbeit<\u002Fdiv>\n    <h2 style=\"font-family:'Archivo'; font-size:clamp(28px,3.6vw,42px); font-weight:800; letter-spacing:-0.025em; line-height:1.1; margin:0; color:#16241e;\">In drei Schritten zur Lösung<\u002Fh2>\n    <div style=\"display:flex; flex-wrap:wrap; gap:20px; margin-top:52px;\">\n      <div style=\"flex:1 1 300px; background:#f4f6f5; border-radius:16px; padding:36px;\">\n        <div style=\"font-family:'Archivo'; font-size:15px; font-weight:700; color:#25a17c; letter-spacing:0.04em;\">01<\u002Fdiv>\n        <h3 style=\"font-family:'Archivo'; font-size:23px; font-weight:700; margin:14px 0 10px; color:#16241e;\">Vorabgespräch<\u002Fh3>\n        <p style=\"font-size:16px; line-height:1.6; color:#5c6e66; margin:0;\">Wir lernen Ihr Vorhaben kennen, klären Ziele und prüfen, wo Agenten den größten Hebel haben.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"flex:1 1 300px; background:#f4f6f5; border-radius:16px; padding:36px;\">\n        <div style=\"font-family:'Archivo'; font-size:15px; font-weight:700; color:#25a17c; letter-spacing:0.04em;\">02<\u002Fdiv>\n        <h3 style=\"font-family:'Archivo'; font-size:23px; font-weight:700; margin:14px 0 10px; color:#16241e;\">Setup &amp; Beispielprojekt<\u002Fh3>\n        <p style=\"font-size:16px; line-height:1.6; color:#5c6e66; margin:0;\">Gemeinsames Gespräch, Setup der passenden Agenten und ein erstes Beispielprojekt an echten Daten.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"flex:1 1 300px; background:#0e4a36; border-radius:16px; padding:36px;\">\n        <div style=\"font-family:'Archivo'; font-size:15px; font-weight:700; color:#5fbf9b; letter-spacing:0.04em;\">03<\u002Fdiv>\n        <h3 style=\"font-family:'Archivo'; font-size:23px; font-weight:700; margin:14px 0 10px; color:#ffffff;\">Projekte &amp; Support<\u002Fh3>\n        <p style=\"font-size:16px; line-height:1.6; color:#aecabd; margin:0;\">Laufende Projekte, Betreuung und kontinuierliche Weiterentwicklung Ihres Agentennetzwerks.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===== CTA / FOOTER ===== -->\n<section id=\"kontakt\" style=\"background:#0e2d22;\">\n  <div style=\"max-width:1160px; margin:0 auto; padding:96px 32px;\">\n    <div style=\"display:flex; flex-wrap:wrap; gap:40px; align-items:center; justify-content:space-between;\">\n      <div style=\"flex:1 1 420px;\">\n        <h2 style=\"font-family:'Archivo'; font-size:clamp(28px,3.6vw,40px); font-weight:800; letter-spacing:-0.025em; line-height:1.1; margin:0; color:#fff;\">Bereit für nachhaltige Entscheidungen?<\u002Fh2>\n        <p style=\"font-size:18px; line-height:1.6; color:#aecabd; max-width:520px; margin:18px 0 0;\">Starten Sie mit einem unverbindlichen Vorabgespräch. Wir zeigen Ihnen, welche Agenten für Ihr Vorhaben den Unterschied machen.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column; gap:14px; align-items:flex-start;\">\n        <a href=\"#kontakt\" style=\"display:inline-flex; align-items:center; gap:10px; font-weight:700; font-size:18px; color:#0e2d22; background:#34b88c; padding:18px 34px; border-radius:12px; box-shadow:0 12px 28px rgba(52,184,140,0.28);\">Vorabgespräch vereinbaren <span style=\"display:inline-block; animation:nudge 1.6s ease-in-out infinite;\">→<\u002Fspan><\u002Fa>\n        <div style=\"display:flex; align-items:center; gap:16px; flex-wrap:wrap; font-size:13.5px; font-weight:500; color:#9fc7b5;\">\n          <span style=\"display:inline-flex; align-items:center; gap:7px;\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#34b88c\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>Kostenlos &amp; unverbindlich<\u002Fspan>\n          <span style=\"display:inline-flex; align-items:center; gap:7px;\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#34b88c\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>Antwort in 24 h<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"border-top:1px solid #1d4537; margin-top:72px; padding-top:32px; display:flex; flex-wrap:wrap; gap:20px; align-items:center; justify-content:space-between;\">\n      <div style=\"display:flex; align-items:center; gap:12px;\">\n        <svg width=\"26\" height=\"26\" viewBox=\"0 0 56 56\" fill=\"none\" stroke=\"#ffffff\" stroke-width=\"3\" stroke-linecap=\"round\"><line x1=\"18\" y1=\"38\" x2=\"18\" y2=\"18\"><\u002Fline><line x1=\"18\" y1=\"18\" x2=\"38\" y2=\"38\"><\u002Fline><line x1=\"38\" y1=\"38\" x2=\"38\" y2=\"18\"><\u002Fline><circle cx=\"38\" cy=\"18\" r=\"5.4\" fill=\"#34b88c\" stroke=\"none\"><\u002Fcircle><\u002Fsvg>\n        <span style=\"font-family:'Archivo'; font-size:18px; font-weight:700; letter-spacing:-0.02em; color:#fff;\">Nexwerk<\u002Fspan>\n      <\u002Fdiv>\n      <span style=\"font-size:14px; color:#6ea58e;\">Agentische Entscheidungsunterstützung für nachhaltige Lösungen.<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===== STICKY MOBILE CTA ===== -->\n<div class=\"nx-mobilecta\" style=\"position:fixed; left:0; right:0; bottom:0; z-index:60; background:rgba(255,255,255,0.94); backdrop-filter:blur(10px); border-top:1px solid #e6ece9; padding:11px 16px; align-items:center; justify-content:space-between; gap:12px;\">\n  <div style=\"display:flex; flex-direction:column;\">\n    <span style=\"font-family:'Archivo'; font-size:14px; font-weight:700; color:#16241e;\">Vorabgespräch<\u002Fspan>\n    <span style=\"font-size:11.5px; color:#5c6e66;\">Kostenlos &amp; unverbindlich<\u002Fspan>\n  <\u002Fdiv>\n  <a href=\"#kontakt\" style=\"display:inline-flex; align-items:center; gap:8px; font-weight:700; font-size:15px; color:#fff; background:#25a17c; padding:13px 22px; border-radius:10px; box-shadow:0 6px 16px rgba(37,161,124,0.3);\">Jetzt starten →<\u002Fa>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;pace&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Ruhig&quot;,&quot;Normal&quot;,&quot;Lebhaft&quot;],&quot;default&quot;:&quot;Normal&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;glow&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  stageRef = React.createRef();\n  state = { items: [] };\n  agentsY = [127, 221, 315, 409];\n  uid = 0;\n  timers = [];\n  apply() {\n    const el = this.stageRef.current;\n    if (!el) return;\n    const pace = this.props.pace || 'Normal';\n    const dur = pace === 'Ruhig' ? '6s' : pace === 'Lebhaft' ? '2.6s' : '4s';\n    el.style.setProperty('--pace', dur);\n    el.style.setProperty('--glow', (this.props.glow ?? true) ? 'drop-shadow(0 0 5px rgba(52,184,140,.65))' : 'none');\n  }\n  paceMs() {\n    const p = this.props.pace || 'Normal';\n    return p === 'Ruhig' ? 2200 : p === 'Lebhaft' ? 1100 : 1600;\n  }\n  add(item) { this.setState(s => ({ items: [...s.items, item] })); }\n  remove(id) { this.setState(s => ({ items: s.items.filter(it => it.id !== id) })); }\n  later(fn, ms) { const t = setTimeout(fn, ms); this.timers.push(t); return t; }\n  cycle(i) {\n    const cy = this.agentsY[i];\n    const D = this.paceMs();\n    const pid = ++this.uid;\n    this.add({ id: pid, kind: 'pkt', dir: 'in', cy });\n    this.later(() => {\n      this.remove(pid); // arrived → packet disappears\n      const fail = Math.random() < 0.3;\n      if (!fail) {\n        const cid = ++this.uid;\n        this.add({ id: cid, kind: 'check', cy });\n        this.later(() => this.remove(cid), 1300);\n        const rid = ++this.uid; // agent reports the validated result up to Nexwerk\n        this.add({ id: rid, kind: 'report', cy });\n        this.later(() => {\n          this.remove(rid);\n          const puid = ++this.uid;\n          this.add({ id: puid, kind: 'pulse' });\n          this.later(() => this.remove(puid), 800);\n        }, this.paceMs());\n        this.later(() => this.cycle(i), 1500 + Math.random() * 1000);\n      } else {\n        const xid = ++this.uid;\n        this.add({ id: xid, kind: 'cross', cy });\n        this.later(() => this.remove(xid), 1300);\n        const bid = ++this.uid; // document goes back to the company\n        this.add({ id: bid, kind: 'pkt', dir: 'back', cy });\n        this.later(() => this.remove(bid), D);\n        this.later(() => this.cycle(i), Math.max(D, 1300) + 800 + Math.random() * 800);\n      }\n    }, D + 40);\n  }\n  componentDidMount() {\n    this.apply();\n    this.agentsY.forEach((cy, i) => this.later(() => this.cycle(i), 300 + i * 650));\n    this.later(() => this.deliver(), 1600);\n  }\n  componentDidUpdate() { this.apply(); }\n  componentWillUnmount() { this.timers.forEach(clearTimeout); }\n  deliver() {\n    const bid = ++this.uid; // collected reports leave Nexwerk as a bundle, down-right then up to the company\n    this.add({ id: bid, kind: 'bundle' });\n    this.later(() => this.remove(bid), Math.round(this.paceMs() * 2.2) + 300);\n    this.later(() => this.deliver(), Math.round(this.paceMs() * 2.6) + Math.random() * 800);\n  }\n  renderVals() {\n    const R = React.createElement;\n    const dur = this.paceMs();\n    const doc = (stroke) => [\n      R('rect', { key: 'r', x: -8, y: -10, width: 16, height: 20, rx: 2.5, fill: '#ffffff', stroke: stroke, strokeWidth: 1.5 }),\n      R('line', { key: 'a', x1: -3.5, y1: -3.5, x2: 3.5, y2: -3.5, stroke: stroke, strokeWidth: 1.3 }),\n      R('line', { key: 'b', x1: -3.5, y1: 0.5, x2: 3.5, y2: 0.5, stroke: stroke, strokeWidth: 1.3 }),\n      R('line', { key: 'c', x1: -3.5, y1: 4.5, x2: 1.5, y2: 4.5, stroke: stroke, strokeWidth: 1.3 })\n    ];\n    const docS = (k, tx, ty) => R('g', { key: k, transform: 'translate(' + tx + ',' + ty + ')' },\n      R('rect', { key: 'r', x: -7, y: -9, width: 14, height: 18, rx: 2, fill: '#ffffff', stroke: '#34b88c', strokeWidth: 1.4 }),\n      R('line', { key: 'a', x1: -3, y1: -3, x2: 3, y2: -3, stroke: '#34b88c', strokeWidth: 1.2 }),\n      R('line', { key: 'b', x1: -3, y1: 1, x2: 3, y2: 1, stroke: '#34b88c', strokeWidth: 1.2 })\n    );\n    const items = this.state.items.map((it) => {\n      if (it.kind === 'pkt') {\n        const inDir = it.dir === 'in';\n        const baseX = inDir ? 792 : 628;\n        const baseY = inDir ? 256 : it.cy;\n        const dx = inDir ? -184 : 172;\n        const dy = inDir ? (it.cy - 256) : (256 - it.cy);\n        const stroke = inDir ? '#8fbcab' : '#e5897f';\n        return R('g', { key: it.id, transform: 'translate(' + baseX + ',' + baseY + ')' },\n          R('g', { style: { '--dx': dx + 'px', '--dy': dy + 'px', animation: 'travel ' + dur + 'ms linear forwards', filter: 'var(--glow,none)' } }, doc(stroke))\n        );\n      }\n      if (it.kind === 'report') {\n        const dx = 186 - 372;\n        const dy = 252 - it.cy;\n        return R('g', { key: it.id, transform: 'translate(372,' + it.cy + ')' },\n          R('g', { style: { '--dx': dx + 'px', '--dy': dy + 'px', animation: 'travel ' + dur + 'ms linear forwards', filter: 'var(--glow,none)' } }, doc('#34b88c'))\n        );\n      }\n      if (it.kind === 'pulse') {\n        return R('g', { key: it.id, transform: 'translate(172,252)' },\n          R('circle', { r: 9, fill: 'none', stroke: '#34b88c', strokeWidth: 2, style: { animation: 'ring 800ms ease-out forwards', transformBox: 'fill-box', transformOrigin: 'center' } })\n        );\n      }\n      if (it.kind === 'bundle') {\n        return R('g', { key: it.id, transform: 'translate(111,314)' },\n          R('g', { style: { '--x1': '0px', '--y1': '186px', '--x2': '777px', '--y2': '186px', '--x3': '777px', '--y3': '4px', animation: 'deliver ' + Math.round(dur * 2.2) + 'ms ease-in-out forwards', filter: 'var(--glow,none)' } },\n            docS('d1', 5, -5), docS('d2', 0, 0), docS('d3', -5, 5),\n            R('circle', { key: 'ab', cx: 18, cy: -1, r: 7, fill: '#34b88c' }),\n            R('path', { key: 'ap', d: 'M 15 -1 L 21 -1 M 18.5 -3.5 L 21 -1 L 18.5 1.5', fill: 'none', stroke: '#0e2d22', strokeWidth: 1.6, strokeLinecap: 'round', strokeLinejoin: 'round' })\n          )\n        );\n      }\n      if (it.kind === 'check') {\n        return R('g', { key: it.id, transform: 'translate(600,' + (it.cy - 9) + ')' },\n          R('g', { style: { animation: 'markPop 1300ms ease-out forwards' } },\n            R('circle', { r: 8.5, fill: '#34b88c' }),\n            R('path', { d: 'M -4 0 L -1 3 L 4 -3.5', fill: 'none', stroke: '#0e2d22', strokeWidth: 2, strokeLinecap: 'round', strokeLinejoin: 'round' })\n          )\n        );\n      }\n      return R('g', { key: it.id, transform: 'translate(600,' + (it.cy - 9) + ')' },\n        R('g', { style: { animation: 'markPop 1300ms ease-out forwards' } },\n          R('circle', { r: 8.5, fill: '#e5534b' }),\n          R('path', { d: 'M -3.2 -3.2 L 3.2 3.2 M 3.2 -3.2 L -3.2 3.2', fill: 'none', stroke: '#ffffff', strokeWidth: 2, strokeLinecap: 'round' })\n        )\n      );\n    });\n    return { stageRef: this.stageRef, dynamicLayer: R('g', null, items) };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
